[default]
locale = "en-us"
check-file = true
check-filename = true
extend-ignore-re = [
    "(?s)(#|//)\\s*spellchecker:off.*?\\n\\s*(#|//)\\s*spellchecker:on",
]
extend-ignore-identifiers-re = [
    "iif", "iife", "i18n", "i18next", "i18n-t", "i18n-tc", "strat", "Inferrable",
]

[files]
ignore-hidden = true
ignore-files = true
extend-exclude = [
    ".venv/**/*",
    "archive/**/*",
    "build/**/*",
    "dist/**/*",
    "coverage/**/*",
    "**/data/**",
    "/usr/**/*",
    "/tmp/**/*",
    "external",
    "vendor",
    ".git",
]
